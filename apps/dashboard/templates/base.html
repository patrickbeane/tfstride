<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600&display=swap"
    >
    <link rel="stylesheet" href="{{ request.url_for('static', path='dashboard.css') }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="wordmark" href="{{ request.url_for('index') }}">
          <span class="wordmark-mark">CTM</span>
          <span class="wordmark-text">Cloud Threat Modeler</span>
        </a>
        <nav class="site-nav">
          <a href="{{ request.url_for('index') }}">Upload</a>
          <a href="{{ request.url_for('scenarios_page') }}">Demos</a>
          <a href="{{ request.url_for('healthz') }}">Health</a>
          <a href="{{ request.url_for('api_docs') }}">API Docs</a>
        </nav>
      </header>
      <main class="page-main">
        {% block content %}{% endblock %}
      </main>
      <footer class="site-footer">
        <span>Open source on </span>
        <a href="https://github.com/patrickbeane/cloud-threat-modeler" target="_blank" rel="noreferrer">GitHub</a>
      </footer>
    </div>
  </body>
</html>
