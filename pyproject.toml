[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cloud-threat-modeler"
version = "0.1.0"
description = "Deterministic cloud threat modeling for Terraform plan JSON."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Patrick" }
]
dependencies = []

[project.scripts]
cloud-threat-modeler = "cloud_threat_modeler.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
