name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, type check, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_INPUT: "1"
      PIP_DEFAULT_TIMEOUT: "120"
      PIP_RETRIES: "5"
      PIP_PROGRESS_BAR: "off"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        id: install
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check --output-format=github .

      - name: Audit dead code
        run: python -m vulture src tests --min-confidence 100

      - name: Type check provider contracts
        run: basedpyright

      - name: Run tests
        run: python -m pytest

      - name: Network diagnostics
        if: failure() && steps.install.outcome == 'failure'
        run: |
          set +e

          echo "DNS:"
          getent ahosts pypi.org
          getent ahosts files.pythonhosted.org

          echo "IPv4:"
          curl -4 -I --max-time 20 https://files.pythonhosted.org/

          echo "IPv6:"
          curl -6 -I --max-time 20 https://files.pythonhosted.org/